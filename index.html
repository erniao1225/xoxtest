        // 日期种子（完全跟随日历选择）
        function getDateSeed(date) {
            const y = date.getFullYear();
            const m = date.getMonth() + 1;
            const d = date.getDate();
            return Number(`${y}${m}${d}`);
        }

        // 日期不同 → 分数一定不同
        function getScore(base, date, offset) {
            const seed = getDateSeed(date) + offset;
            const rand = Math.sin(seed) * 10000;
            const fluct = Math.floor((rand - Math.floor(rand)) * 41 - 20);
            let score = base + fluct;
            score = Math.max(1, Math.min(100, score));
            return Math.round(score / 5) * 5;
        }

                showFortune(currentZodiacIndex);
            });

            updateDateText();
        }

        function updateDateText() {
            const t = document.getElementById('selected-date-text');
            const q = document.getElementById('query-date-display');
            const today = new Date();
            const isToday = selectedDate.toDateString() === today.toDateString();

            if (isToday) {
                t.textContent = '选择查询日期（当前：今日）';
                q.textContent = '推活运势（今日）';
            } else {
                const fmt = `${selectedDate.getFullYear()}年${selectedDate.getMonth()+1}月${selectedDate.getDate()}日`;
                t.textContent = `选择查询日期（当前：${fmt}）`;
                q.textContent = `推活运势（${fmt}）`;
            }
        }

        function generateZodiacButtons() {
            const grid = document.querySelector('.grid');
            zodiacData.forEach((z, idx) => {
                const btn = document.createElement('button');
                btn.className = `zodiac-btn ${idx === 0 ? 'active' : ''}`;
                btn.innerHTML = `<span class="text-2xl mb-1">${z.icon}</span><span class="text-xs">${z.name}</span>`;
                btn.onclick = () => {
                    document.querySelectorAll('.zodiac-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentZodiacIndex = idx;
                    showFortune(idx);
                };
                grid.appendChild(btn);
            });
        }

        // 核心：日期一变，所有运势全部重新计算
        function showFortune(idx) {
            const z = zodiacData[idx];
            const total = getScore(z.fortune.baseScore, selectedDate, idx * 1000);
            
            // 根据日期获取对应的描述文本
            const seed = getDateSeed(selectedDate);
            const adviceIndex = Math.abs(Math.sin(seed + idx * 2) * 10000 % z.fortune.advices.length);

            // 根据分数选择对应的描述类型
            let descriptionArray;
            if (total >= 80) {
                descriptionArray = z.fortune.goodDescriptions;
            } else if (total >= 60) {
                descriptionArray = z.fortune.normalDescriptions;
            } else {
                descriptionArray = z.fortune.badDescriptions;
            }
            const descIndex = Math.abs(Math.sin(seed + idx) * 10000 % descriptionArray.length);

            document.getElementById('zodiac-icon').textContent = z.icon;
            document.getElementById('zodiac-name').textContent = z.name;
            document.getElementById('zodiac-date').textContent = z.date;
            document.getElementById('fortune-rating').textContent = getRatingByScore(total);
            document.getElementById('fortune-score').textContent = `${total}/100`;
            document.getElementById('fortune-meter-fill').style.width = total + '%';
            document.getElementById('fortune-description').textContent = descriptionArray[Math.floor(descIndex)];
            document.getElementById('fortune-advice').textContent = z.fortune.advices[Math.floor(adviceIndex)];

            const list = document.getElementById('fortune-details');
            list.innerHTML = '';
            z.fortune.details.forEach((item, i) => {
                const s = getScore(item.baseScore, selectedDate, idx * 1000 + i + 1);
                const variationIndex = Math.abs(Math.sin(seed + idx * 10 + i) * 10000 % item.variations.length);
                const variation = item.variations[Math.floor(variationIndex)];
                const li = document.createElement('li');
                li.className = 'flex justify-between items-center';
                
                // 根据分数添加额外描述
                let extraDescription = '';
                if (s >= 90) {
                    extraDescription = '（超幸运！）';
                } else if (s >= 80) {
                    extraDescription = '（很有希望！）';
                } else if (s >= 70) {
                    extraDescription = '（不错的一天！）';
                } else if (s >= 60) {
                    extraDescription = '（加油！）';
                } else {
                    extraDescription = '（明天会更好！）';
                }
                
                li.innerHTML = `
                    <span>${variation} <span class="text-xs text-textLight">${extraDescription}</span></span>
                    <div class="flex items-center gap-2">
                        <div class="fortune-meter w-24 h-2"><div class="fortune-meter-fill" style="width:${s}%"></div></div>
                        <span class="text-xs">${s}</span>
                    </div>
                `;
                list.appendChild(li);
            });

            updateColors(z.colors);
            document.getElementById('fortune-section').style.opacity = 1;
            document.getElementById('colors-section').style.opacity = 1;
        }

        function updateColors(colors) {
            const swatches = document.getElementById('color-swatches');
            const desc = document.getElementById('color-description');
            swatches.innerHTML = '';
            desc.innerHTML = '';

            colors.forEach((c, i) => {
                const div = document.createElement('div');
                div.className = 'color-swatch';
                div.style.backgroundColor = c.hex;
                div.onclick = () => {
                    document.querySelectorAll('.color-swatch').forEach(s => s.style.transform = 'scale(1)');
                    div.style.transform = 'scale(1.1)';
                    desc.innerHTML = `<h3 class="font-semibold">${c.name}</h3><p>${c.description}</p>`;
                };
                swatches.appendChild(div);
                if (i === 0) {
                    div.style.transform = 'scale(1.1)';
                    desc.innerHTML = `<h3 class="font-semibold">${c.name}</h3><p>${c.description}</p>`;
                }
            });
        }

        // 获取运势评级的动态描述
        function getRatingDescription(rating, score) {
            const descriptions = {
                '热血': ['爆发中', '火力全开', '干劲十足', '元气满满', '能量充沛'],
                '欧气': ['幸运加持', '财运亨通', '福运当头', '时来运转', '祥瑞降临'],
                '社牛': ['人脉广开', '左右逢源', '八面玲珑', '谈笑风生', '魅力四射'],
                '暖心': ['治愈满满', '温情脉脉', '爱意浓浓', '感动常在', '温暖如春'],
                '闪耀': ['光芒万丈', '璀璨夺目', '万众瞩目', '星光熠熠', '光彩照人'],
                '细致': ['精益求精', '无微不至', '明察秋毫', '匠心独运', '一丝不苟'],
                '和谐': ['水乳交融', '相得益彰', '珠联璧合', '同心协力', '和衷共济'],
                '本命': ['心心相印', '息息相通', '情投意合', '一见如故', '相见恨晚'],
                '快乐': ['笑口常开', '欢乐开怀', '喜不自胜', '乐不思蜀', '欣喜若狂'],
                '稳健': ['稳扎稳打', '步步为营', '坚如磐石', '老成持重', '从容不迫'],
                '创意': ['灵感泉涌', '脑洞大开', '匠心独具', '别出心裁', '标新立异'],
                '共情': ['心有灵犀', '感同身受', '息息相通', '情同手足', '志同道合']
            };
            
            const ratingDescs = descriptions[rating] || [];
            if (ratingDescs.length === 0) return '';
            
            const seed = getDateSeed(selectedDate);
            const index = Math.abs(Math.sin(seed * score) * 10000 % ratingDescs.length);
            return ratingDescs[Math.floor(index)];
        }

        // 根据分数获取评级
        function getRatingByScore(score) {
            if (score >= 90) return '超神';
            if (score >= 80) return '幸运';
            if (score >= 70) return '良好';
            if (score >= 60) return '普通';
            if (score >= 50) return '低迷';
            return '不宜';
        }

        // 获取分数对应的描述
        function getScoreDescription(score) {
            if (score >= 90) return '（超幸运！）';
            if (score >= 80) return '（很有希望！）';
            if (score >= 70) return '（不错的一天！）';
            if (score >= 60) return '（加油！）';
            if (score >= 50) return '（有点困难...）';
            return '（明天会更好！）';
        }

        // 获取随机提示
        function getRandomTip(score, category) {
            const tips = {
                '推し互动': [
                    '可能会有意外的眼神交流',
                    '记得准备好相机捕捉瞬间',
                    '保持微笑增加好感度',
                    '提前练习打招呼的方式',

                '抽赏运气': [

                    '记得洗手再抽选',

                    '保持平常心更容易中奖'
                ],
                '推し回应': [
                    '真诚的支持最能打动推し',
                    '用心的小礼物会被珍惜',

                ]
            };
            
            const categoryTips = tips[category] || [];
            if (categoryTips.length === 0 || Math.random() > 0.3) return ''; // 30%概率出现提示
            
            const seed = getDateSeed(selectedDate);
            const index = Math.abs(Math.sin(seed * score) * 10000 % categoryTips.length);
            return categoryTips[Math.floor(index)];
        }

        // 生成动态运势描述
        function generateDynamicDescription(zodiac, date, index) {
            const seed = getDateSeed(date);
            const baseDesc = zodiac.fortune.descriptions[Math.floor(Math.abs(Math.sin(seed + index) * 10000 % zodiac.fortune.descriptions.length))];
            
            // 添加随机事件
            const events = generateRandomEvents(zodiac, date, index);
            if (events.length > 0) {
                const randomEvent = events[Math.floor(Math.abs(Math.sin(seed * 2) * 10000 % events.length))];
                return baseDesc + ' ' + randomEvent;
            }
            
            return baseDesc;
        }

        // 生成随机事件
        function generateRandomEvents(zodiac, date, index) {
            const events = [
                '今天推し可能会在SHOWROOM进行突发配信，记得开启通知提醒。',
                '同担群内可能会分享推し的生写真入手渠道，保持在线获取最新情报。',
                '今天推し的MC状态超绝，可能会有很多可爱的小剧场和即兴表演。',
                '官方可能会突击发售限定Badge和生写，准备好网速和钱包。',
                'Live中可能会有推し的个人SOLO环节，这是拍神图的绝佳时机。',

                '现场可能会发放推し的限定应援扇，早到的粉丝才有机会获得。',
                '今天推し的舞蹈动作特别有力，call点会比平时更加清晰明显。',
                '可能会有推し的个人广播节目，记得准时收听并参与互动。',
                '推し今天可能会尝试新的发型或妆容，是收集新素材的好日子。',
                '现场可能会有推し的惊喜发言，说不定会提到粉丝的支持和应援。',
                '今天的live可能会有安可环节，推し的返场表演会更加精彩。',

                '今天是推し加入组合的纪念日，官方可能会有特别活动和周边发售。'
            ];
            
            // 根据星座和日期筛选合适的事件
            const filteredEvents = events.filter((_, i) => {
                const eventSeed = getDateSeed(date) + i + index;
                return Math.abs(Math.sin(eventSeed) * 10000 % 10) > 5; // 50%概率保留事件
            });
            
            return filteredEvents;
        }
