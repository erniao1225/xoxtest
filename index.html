            { id: 'cancer', name: '巨蟹座', icon: '♋', date: '6月22日 - 7月22日', fortune: { rating: '暖心', baseScore: 72, goodDescriptions: [''], normalDescriptions: [''], badDescriptions: [''], details: [], advices: [] }, colors: [{ hex: '#D4B9C9', name: '柔粉色', description: '' }, { hex: '#B9D4C9', name: '浅青色', description: '' }] },
            { id: 'leo', name: '狮子座', icon: '♌', date: '7月23日 - 8月22日', fortune: { rating: '闪耀', baseScore: 85, goodDescriptions: [''], normalDescriptions: [''], badDescriptions: [''], details: [], advices: [] }, colors: [{ hex: '#C9D4B9', name: '暖黄色', description: '' }, { hex: '#C9B9B9', name: '暖橘色', description: '' }] },
            { id: 'virgo', name: '处女座', icon: '♍', date: '8月23日 - 9月22日', fortune: { rating: '细致', baseScore: 78, goodDescriptions: [''], normalDescriptions: [''], badDescriptions: [''], details: [], advices: [] }, colors: [{ hex: '#B9C9D4', name: '清灰色', description: '' }, { hex: '#C9D4CF', name: '浅米色', description: '' }] },
            { id: 'libra', name: '天秤座', icon: '♎', date: '9月23日 - 10月23日', fortune: { rating: '优雅', baseScore: 76, goodDescriptions: [''], normalDescriptions: [''], badDescriptions: [''], details: [], advices: [] }, colors: [{ hex: '#D4C9B9', name: '奶茶灰', description: '' }, { hex: '#B9D4D4', name: '浅蓝灰', description: '' }] },
            { id: 'scorpio', name: '天蝎座', icon: '♏', date: '10月24日 - 11月22日', fortune: { rating: '神秘', baseScore: 79, goodDescriptions: [''], normalDescriptions: [''], badDescriptions: [''], details: [], advices: [] }, colors: [{ hex: '#B9B9D4', name: '暗紫色', description: '' }, { hex: '#C9B9D4', name: '深粉色', description: '' }] },
            { id: 'sagittarius', name: '射手座', icon: '♐', date: '11月23日 - 12月21日', fortune: { rating: '自由', baseScore: 82, goodDescriptions: [''], normalDescriptions: [''], badDescriptions: [''], details: [], advices: [] }, colors: [{ hex: '#D4C9B9', name: '暖棕色', description: '' }, { hex: '#B9D4B9', name: '草绿色', description: '' }] },
            { id: 'capricorn', name: '摩羯座', icon: '♑', date: '12月22日 - 1月19日', fortune: { rating: '稳重', baseScore: 71, goodDescriptions: [''], normalDescriptions: [''], badDescriptions: [''], details: [], advices: [] }, colors: [{ hex: '#B9C9C9', name: '深灰色', description: '' }, { hex: '#C9C9B9', name: '浅卡其', description: '' }] },
            { id: 'aquarius', name: '水瓶座', icon: '♒', date: '1月20日 - 2月18日', fortune: { rating: '创意', baseScore: 83, goodDescriptions: [''], normalDescriptions: [''], badDescriptions: [''], details: [], advices: [] }, colors: [{ hex: '#B9D4C9', name: '青绿色', description: '' }, { hex: '#C9B9D4', name: '幻紫色', description: '' }] },
            { id: 'pisces', name: '双鱼座', icon: '♓', date: '2月19日 - 3月20日', fortune: { rating: '浪漫', baseScore: 74, goodDescriptions: [''], normalDescriptions: [''], badDescriptions: [''], details: [], advices: [] }, colors: [{ hex: '#D4B9D4', name: '粉紫色', description: '' }, { hex: '#B9C9D4', name: '海蓝色', description: '' }] }
        ];

        // 全局变量
        let currentZodiac = zodiacData[0]; // 默认白羊座
        let currentDate = new Date();
        let selectedDate = currentDate;

        // 初始化页面
        document.addEventListener('DOMContentLoaded', () => {
            initZodiacButtons();
            initCalendar();
            updateFortuneDisplay();
            updateColorDisplay();
            
            // 默认选中第一个星座
            const firstBtn = document.querySelector('.zodiac-btn');
            if (firstBtn) firstBtn.classList.add('active');
        });

        // 初始化星座按钮
        function initZodiacButtons() {
            const container = document.getElementById('zodiac-buttons');
            zodiacData.forEach(zodiac => {
                const btn = document.createElement('button');
                btn.className = 'zodiac-btn';
                btn.dataset.zodiacId = zodiac.id;
                btn.innerHTML = `
                    <span class="text-2xl mb-1">${zodiac.icon}</span>
                    <span class="text-sm">${zodiac.name}</span>
                `;
                
                // 点击切换星座
                btn.addEventListener('click', () => {
                    // 移除所有active状态
                    document.querySelectorAll('.zodiac-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    // 更新当前星座
                    currentZodiac = zodiacData.find(z => z.id === zodiac.id);
                    
                    // 更新显示
                    updateFortuneDisplay();
                    updateColorDisplay();
                    
                    // 显示运势区域
                    document.getElementById('fortune-section').style.opacity = 1;
                    document.getElementById('colors-section').style.opacity = 1;
                });
                
                container.appendChild(btn);
            });
        }

        // 初始化日历功能
        function initCalendar() {
            const calendarToggle = document.getElementById('calendar-toggle');
            const calendarModal = document.getElementById('calendar-modal');
            const closeCalendar = document.getElementById('close-calendar');
            const confirmDate = document.getElementById('confirm-date');
            const resetDate = document.getElementById('reset-date');
            const datePicker = document.getElementById('date-picker');
            
            // 设置日期选择器默认值
            const today = new Date();
            datePicker.value = today.toISOString().split('T')[0];
            
            // 打开日历弹窗
            calendarToggle.addEventListener('click', () => {
                calendarModal.classList.add('active');
            });
            
            // 关闭日历弹窗
            closeCalendar.addEventListener('click', () => {
                calendarModal.classList.remove('active');
            });
            
            // 点击弹窗外层关闭
            calendarModal.addEventListener('click', (e) => {
                if (e.target === calendarModal) {
                    calendarModal.classList.remove('active');
                }
            });
            
            // 重置为今日
            resetDate.addEventListener('click', () => {
                selectedDate = new Date();
                datePicker.value = selectedDate.toISOString().split('T')[0];
                updateDateDisplay();
                updateFortuneDisplay();
                calendarModal.classList.remove('active');
            });
            
            // 确认选择日期
            confirmDate.addEventListener('click', () => {
                selectedDate = new Date(datePicker.value);
                if (isNaN(selectedDate.getTime())) {
                    selectedDate = new Date();
                }
                updateDateDisplay();
                updateFortuneDisplay();
                calendarModal.classList.remove('active');
            });
        }

        // 更新日期显示
        function updateDateDisplay() {
            const dateText = document.getElementById('selected-date-text');
            const queryDateDisplay = document.getElementById('query-date-display');
            
            const today = new Date();
            const isToday = selectedDate.toDateString() === today.toDateString();
            
            if (isToday) {
                dateText.textContent = '选择查询日期（当前：今日）';
                queryDateDisplay.textContent = '推活运势（今日）';
            } else {
                const formattedDate = selectedDate.toLocaleDateString('zh-CN', { 
                    year: 'numeric', month: 'long', day: 'numeric' 
                });
                dateText.textContent = `选择查询日期（当前：${formattedDate}）`;
                queryDateDisplay.textContent = `推活运势（${formattedDate}）`;
            }
        }

        // 更新运势显示
        function updateFortuneDisplay() {
            // 基础信息
            document.getElementById('zodiac-icon').textContent = currentZodiac.icon;
            document.getElementById('zodiac-name').textContent = currentZodiac.name;
            document.getElementById('zodiac-date').textContent = currentZodiac.date;
            document.getElementById('fortune-rating').textContent = currentZodiac.fortune.rating;
            
            // 计算运势分数（根据日期和基础分随机波动）
            const randomFactor = (selectedDate.getDate() + selectedDate.getMonth()) % 15 - 7;
            let fortuneScore = currentZodiac.fortune.baseScore + randomFactor;
            fortuneScore = Math.max(0, Math.min(100, fortuneScore)); // 限制0-100
            document.getElementById('fortune-score').textContent = `${fortuneScore}分`;
            document.getElementById('fortune-meter-fill').style.width = `${fortuneScore}%`;
            
            // 选择运势描述
            let description;
            if (fortuneScore >= 80) {
                const randomIdx = Math.floor(Math.random() * currentZodiac.fortune.goodDescriptions.length);
                description = currentZodiac.fortune.goodDescriptions[randomIdx] || currentZodiac.fortune.goodDescriptions[0];
            } else if (fortuneScore >= 60) {
                const randomIdx = Math.floor(Math.random() * currentZodiac.fortune.normalDescriptions.length);
                description = currentZodiac.fortune.normalDescriptions[randomIdx] || currentZodiac.fortune.normalDescriptions[0];
            } else {
                const randomIdx = Math.floor(Math.random() * currentZodiac.fortune.badDescriptions.length);
                description = currentZodiac.fortune.badDescriptions[randomIdx] || currentZodiac.fortune.badDescriptions[0];
            }
            document.getElementById('fortune-description').textContent = description;
            
            // 生成应援详情
            const detailsContainer = document.getElementById('fortune-details');
            detailsContainer.innerHTML = '';
            currentZodiac.fortune.details.forEach(detail => {
                if (!detail.variations || detail.variations.length === 0) return;
                
                // 计算分项分数
                const detailRandom = (selectedDate.getDate() + detail.baseScore) % 10 - 5;
                const detailScore = Math.max(0, Math.min(100, detail.baseScore + detailRandom));
                
                // 随机选择描述
                const randomDesc = detail.variations[Math.floor(Math.random() * detail.variations.length)];
                
                const li = document.createElement('li');
                li.className = 'flex justify-between items-center';
                li.innerHTML = `
                    <span class="text-textMain">${randomDesc}</span>
                    <div class="flex items-center gap-2">
                        <div class="w-24 h-2 rounded-full bg-bgLight overflow-hidden">
                            <div class="h-full bg-primary" style="width: ${detailScore}%"></div>
                        </div>
                        <span class="text-xs text-textLight">${detailScore}分</span>
                    </div>
                `;
                detailsContainer.appendChild(li);
            });
            
            // 随机选择推活建议
            if (currentZodiac.fortune.advices && currentZodiac.fortune.advices.length > 0) {
                const randomAdvice = currentZodiac.fortune.advices[Math.floor(Math.random() * currentZodiac.fortune.advices.length)];
                document.getElementById('fortune-advice').textContent = randomAdvice;
            }
            
            // 显示区域
            document.getElementById('fortune-section').style.opacity = 1;
        }

        // 更新幸运色显示
        function updateColorDisplay() {
            const swatchesContainer = document.getElementById('color-swatches');
            const colorDesc = document.getElementById('color-description');
            
            swatchesContainer.innerHTML = '';
            
            // 随机选2个幸运色（莫兰迪风格）
            const shuffledColors = [...currentZodiac.colors].sort(() => 0.5 - Math.random());
            const selectedColors = shuffledColors.slice(0, 2);
            
            // 生成色卡
            selectedColors.forEach(color => {
                const swatch = document.createElement('div');
                swatch.className = 'color-swatch';
                swatch.style.backgroundColor = color.hex;
                swatch.title = color.name;
                
                // 点击色卡显示描述
                swatch.addEventListener('click', () => {
                    colorDesc.textContent = `${color.name}（${color.hex}）：${color.description}`;
                });
                
                swatchesContainer.appendChild(swatch);
            });
            
            // 默认显示第一个色卡描述
            if (selectedColors.length > 0) {
                colorDesc.textContent = `${selectedColors[0].name}（${selectedColors[0].hex}）：${selectedColors[0].description}`;
            }
            
            // 显示区域
            document.getElementById('colors-section').style.opacity = 1;
        }
    </script>
</body>
</html>
